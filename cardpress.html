<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARDPRESS — Business Card Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#14161a;
    --panel:#1b1e22;
    --panel-2:#20242a;
    --stock:#ece5d6;
    --stock-dim:#d8d0bd;
    --copper:#c08a4e;
    --copper-light:#d9a868;
    --teal:#2b4c4a;
    --teal-light:#3e6864;
    --mist:#9aa0a6;
    --line: rgba(255,255,255,0.09);
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--stock);
    font-family:var(--font-body);
    min-height:100vh;
    padding:28px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
  a{color:inherit;}
  button{font-family:inherit;}

  /* ---------- crop marks ---------- */
  .app{
    position:relative;
    max-width:1180px;
    margin:0 auto;
    padding:34px;
  }
  .crop{
    position:absolute;
    width:22px; height:22px;
    pointer-events:none;
  }
  .crop::before,.crop::after{
    content:"";
    position:absolute;
    background:var(--mist);
    opacity:0.55;
  }
  .crop::before{ width:100%; height:1px; top:50%; left:0; }
  .crop::after{ width:1px; height:100%; left:50%; top:0; }
  .crop.tl{ top:0; left:0; }
  .crop.tr{ top:0; right:0; }
  .crop.bl{ bottom:0; left:0; }
  .crop.br{ bottom:0; right:0; }

  /* ---------- header ---------- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:30px;
  }
  .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    letter-spacing:0.5px;
  }
  .brand span{ color:var(--copper); }
  .job-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--mist);
    letter-spacing:1px;
    text-align:right;
  }

  /* ---------- layout ---------- */
  .layout{
    display:grid;
    grid-template-columns: 1fr 1.15fr;
    gap:48px;
  }
  @media (max-width: 880px){
    .layout{ grid-template-columns: 1fr; }
  }

  .panel-title{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:2px;
    color:var(--copper-light);
    text-transform:uppercase;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .panel-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* ---------- form (job ticket) ---------- */
  .field{
    margin-bottom:16px;
  }
  .field label{
    display:block;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--mist);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:2px;
    padding:10px 12px;
    color:var(--stock);
    font-family:var(--font-body);
    font-size:14px;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input:focus{
    border-color:var(--copper);
  }
  .field input:focus-visible{
    outline:2px solid var(--copper-light);
    outline-offset:1px;
  }
  .field input::placeholder{ color:#5b6066; }

  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .subhead{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:1.5px;
    color:var(--mist);
    text-transform:uppercase;
    margin:26px 0 14px;
    padding-top:16px;
    border-top:1px dashed var(--line);
  }

  .photo-row{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:22px;
  }
  .photo-well{
    width:64px; height:64px;
    border-radius:50%;
    border:1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    background:var(--panel);
  }
  .photo-well img{ width:100%; height:100%; object-fit:cover; }
  .photo-well svg{ width:22px; height:22px; stroke:var(--mist); }

  .btn-ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--stock);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:9px 14px;
    border-radius:2px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .btn-ghost:hover{ border-color:var(--copper); color:var(--copper-light); }
  .btn-ghost:focus-visible{ outline:2px solid var(--copper-light); outline-offset:2px; }
  .photo-clear{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--mist);
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }

  /* ---------- preview panel ---------- */
  .preview-wrap{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .stage{
    position:relative;
    padding:40px;
  }
  .stamp{
    position:absolute;
    top:-6px; right:6px;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:2px;
    color:var(--copper);
    border:1.5px solid var(--copper);
    padding:4px 9px;
    border-radius:3px;
    transform:rotate(6deg);
    opacity:0.85;
  }

  .card{
    width:350px;
    height:200px;
    border-radius:6px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 24px 50px -18px rgba(0,0,0,0.65), 0 2px 10px rgba(0,0,0,0.35);
    font-family:var(--font-body);
  }

  /* --- template: stock --- */
  .card.tpl-stock{
    background:var(--stock);
    color:var(--teal);
    padding:22px 24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .tpl-stock .top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .tpl-stock .name{ font-family:var(--font-display); font-weight:600; font-size:22px; line-height:1.15; }
  .tpl-stock .role{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:1px; color:var(--teal-light); margin-top:4px; text-transform:uppercase; }
  .tpl-stock .avatar{ width:46px; height:46px; border-radius:50%; overflow:hidden; border:1.5px solid var(--copper); flex-shrink:0; }
  .tpl-stock .avatar img{ width:100%; height:100%; object-fit:cover; }
  .tpl-stock .avatar .fallback{ width:100%; height:100%; background:var(--teal); color:var(--stock); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:16px; }
  .tpl-stock .rule{ height:1px; background:var(--copper); opacity:0.6; margin:8px 0; }
  .tpl-stock .contact{ font-size:11.5px; line-height:1.7; }
  .tpl-stock .socials{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.5px; color:var(--teal-light); }
  .tpl-stock .socials b{ color:var(--copper); font-weight:600; }

  /* --- template: ink --- */
  .card.tpl-ink{
    background: linear-gradient(155deg, #191b1f, #121316);
    color:var(--stock);
    padding:22px 24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border:1px solid rgba(192,138,78,0.25);
  }
  .tpl-ink .top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .tpl-ink .name{ font-family:var(--font-display); font-weight:600; font-size:22px; color:var(--copper-light); line-height:1.15; }
  .tpl-ink .role{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:1px; color:var(--mist); margin-top:4px; text-transform:uppercase; }
  .tpl-ink .avatar{ width:46px; height:46px; border-radius:50%; overflow:hidden; border:1.5px solid var(--copper); flex-shrink:0; }
  .tpl-ink .avatar img{ width:100%; height:100%; object-fit:cover; }
  .tpl-ink .avatar .fallback{ width:100%; height:100%; background:#25282d; color:var(--copper-light); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:16px; }
  .tpl-ink .rule{ height:1px; background:linear-gradient(90deg, var(--copper), transparent); margin:8px 0; }
  .tpl-ink .contact{ font-size:11.5px; line-height:1.7; color:#d7d3ca; }
  .tpl-ink .socials{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.5px; color:var(--mist); }
  .tpl-ink .socials b{ color:var(--copper-light); font-weight:600; }

  /* --- template: duotone --- */
  .card.tpl-duotone{
    background:var(--copper);
    color:var(--stock);
    padding:0;
    display:flex;
  }
  .tpl-duotone .half-a{
    position:absolute; inset:0;
    background:var(--teal);
    clip-path:polygon(0 0, 62% 0, 40% 100%, 0 100%);
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 0 0 24px;
  }
  .tpl-duotone .half-a .name{ font-family:var(--font-display); font-weight:600; font-size:23px; color:var(--stock); line-height:1.15; max-width:120px;}
  .tpl-duotone .half-a .role{ font-family:var(--font-mono); font-size:10px; letter-spacing:1px; color:#cfe3e0; text-transform:uppercase; margin-top:6px; }
  .tpl-duotone .content-b{
    position:absolute; right:24px; top:0; bottom:0;
    display:flex; flex-direction:column; justify-content:center;
    align-items:flex-end;
    text-align:right;
    max-width:150px;
  }
  .tpl-duotone .contact{ font-size:11px; line-height:1.8; color:#3a2a16; }
  .tpl-duotone .socials{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.5px; color:#3a2a16; margin-top:6px; }
  .tpl-duotone .avatar{ position:absolute; left:16px; top:16px; width:42px; height:42px; border-radius:50%; overflow:hidden; border:2px solid var(--stock); z-index:2; }
  .tpl-duotone .avatar img{ width:100%; height:100%; object-fit:cover; }
  .tpl-duotone .avatar .fallback{ width:100%; height:100%; background:#1d3634; color:var(--stock); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:14px; }

  /* --- template: grid --- */
  .card.tpl-grid{
    background:#f4f0e6;
    color:#20242a;
    padding:20px 22px;
    display:grid;
    grid-template-rows:auto 1px 1fr;
    row-gap:10px;
  }
  .tpl-grid .top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .tpl-grid .name{ font-family:var(--font-display); font-weight:600; font-size:19px; line-height:1.1; }
  .tpl-grid .role{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:1px; color:#6b6252; text-transform:uppercase; margin-top:3px; }
  .tpl-grid .avatar{ width:36px; height:36px; border-radius:3px; overflow:hidden; border:1px solid #cfc7b3; flex-shrink:0; }
  .tpl-grid .avatar img{ width:100%; height:100%; object-fit:cover; }
  .tpl-grid .avatar .fallback{ width:100%; height:100%; background:#20242a; color:#f4f0e6; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; }
  .tpl-grid .divider{ background:#cfc7b3; }
  .tpl-grid .grid-fields{ display:grid; grid-template-columns:1fr 1fr; column-gap:16px; row-gap:8px; align-content:start; }
  .tpl-grid .gf-label{ font-family:var(--font-mono); font-size:8.5px; letter-spacing:1px; color:#8a806c; text-transform:uppercase; }
  .tpl-grid .gf-value{ font-size:11px; margin-top:2px; word-break:break-word; }
  .tpl-grid .gf-value.copper{ color:var(--copper); font-family:var(--font-mono); font-size:10.5px; }

  /* ---------- template swatches ---------- */
  .swatches{
    display:flex;
    gap:12px;
    margin-top:26px;
  }
  .swatch{
    width:56px; height:32px;
    border-radius:3px;
    cursor:pointer;
    border:1.5px solid var(--line);
    padding:0;
    position:relative;
    transition:border-color .15s ease, transform .15s ease;
  }
  .swatch:hover{ transform:translateY(-2px); }
  .swatch:focus-visible{ outline:2px solid var(--copper-light); outline-offset:2px; }
  .swatch.active{ border-color:var(--copper); }
  .swatch.active::after{
    content:"";
    position:absolute; bottom:-9px; left:50%;
    transform:translateX(-50%);
    width:4px; height:4px;
    background:var(--copper);
    border-radius:50%;
  }
  .swatch.sw-stock{ background:var(--stock); }
  .swatch.sw-ink{ background:linear-gradient(155deg,#22262c,#121316); }
  .swatch.sw-duotone{ background:linear-gradient(120deg, var(--teal) 45%, var(--copper) 45%); }
  .swatch.sw-grid{ background:#f4f0e6; border-style:dashed; }

  .swatch-caption{
    text-align:center;
    font-family:var(--font-mono);
    font-size:9.5px;
    color:var(--mist);
    margin-top:6px;
    letter-spacing:0.5px;
  }
  .swatch-col{ display:flex; flex-direction:column; align-items:center; }

  .actions{
    display:flex;
    gap:12px;
    margin-top:34px;
  }
  .btn-solid{
    background:var(--copper);
    border:none;
    color:#1a1408;
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:11px 18px;
    border-radius:2px;
    cursor:pointer;
    font-weight:600;
    transition:background .15s ease, transform .1s ease;
  }
  .btn-solid:hover{ background:var(--copper-light); }
  .btn-solid:active{ transform:translateY(1px); }
  .btn-solid:focus-visible{ outline:2px solid var(--stock); outline-offset:2px; }
  .btn-solid:disabled{ opacity:0.5; cursor:progress; }

  .hint{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--mist);
    margin-top:16px;
    max-width:360px;
    text-align:center;
    line-height:1.6;
  }
</style>
</head>
<body>

<div class="app">
  <div class="crop tl"></div><div class="crop tr"></div><div class="crop bl"></div><div class="crop br"></div>

  <div class="topbar">
    <div class="brand">CARD<span>PRESS</span></div>
    <div class="job-meta">JOB NO. <span id="jobNo">0000</span><br>DIGITAL PROOF · 1 UP</div>
  </div>

  <div class="layout">
    <!-- FORM -->
    <div>
      <div class="panel-title">Job Ticket</div>

      <div class="photo-row">
        <div class="photo-well" id="photoWell">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="3.5"/><path d="M4 20c1.8-4 4.7-6 8-6s6.2 2 8 6"/></svg>
        </div>
        <div>
          <button class="btn-ghost" id="uploadBtn" type="button">Upload photo</button>
          <input type="file" id="photoInput" accept="image/*" style="display:none">
          <div style="margin-top:8px;"><button class="photo-clear" id="clearPhoto" type="button">remove photo</button></div>
        </div>
      </div>

      <div class="field">
        <label for="fName">Full name</label>
        <input id="fName" placeholder="Alex Rivera" maxlength="40">
      </div>
      <div class="row2">
        <div class="field">
          <label for="fRole">Role / title</label>
          <input id="fRole" placeholder="Product Designer" maxlength="32">
        </div>
        <div class="field">
          <label for="fCompany">Company</label>
          <input id="fCompany" placeholder="Northwind Studio" maxlength="32">
        </div>
      </div>

      <div class="field">
        <label for="fEmail">Email</label>
        <input id="fEmail" placeholder="alex@northwind.co" type="email">
      </div>
      <div class="row2">
        <div class="field">
          <label for="fPhone">Phone</label>
          <input id="fPhone" placeholder="+1 415 555 0132">
        </div>
        <div class="field">
          <label for="fWebsite">Website</label>
          <input id="fWebsite" placeholder="northwind.co">
        </div>
      </div>

      <div class="subhead">Social links</div>
      <div class="row2">
        <div class="field">
          <label for="fLinkedin">LinkedIn</label>
          <input id="fLinkedin" placeholder="in/alexrivera">
        </div>
        <div class="field">
          <label for="fTwitter">X / Twitter</label>
          <input id="fTwitter" placeholder="@alexrivera">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="fGithub">GitHub</label>
          <input id="fGithub" placeholder="alexrivera">
        </div>
        <div class="field">
          <label for="fInstagram">Instagram</label>
          <input id="fInstagram" placeholder="@alex.rivera">
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-wrap">
      <div class="panel-title" style="width:100%;">Proof</div>
      <div class="stage">
        <div class="stamp">PROOF</div>
        <div class="card tpl-stock" id="cardPreview"></div>
      </div>

      <div class="swatches">
        <div class="swatch-col">
          <button class="swatch sw-stock active" data-tpl="stock" aria-label="Stock template" type="button"></button>
          <span class="swatch-caption">STOCK</span>
        </div>
        <div class="swatch-col">
          <button class="swatch sw-ink" data-tpl="ink" aria-label="Ink template" type="button"></button>
          <span class="swatch-caption">INK</span>
        </div>
        <div class="swatch-col">
          <button class="swatch sw-duotone" data-tpl="duotone" aria-label="Duotone template" type="button"></button>
          <span class="swatch-caption">DUOTONE</span>
        </div>
        <div class="swatch-col">
          <button class="swatch sw-grid" data-tpl="grid" aria-label="Grid template" type="button"></button>
          <span class="swatch-caption">GRID</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-solid" id="dlPng" type="button">Download PNG</button>
        <button class="btn-solid" id="dlPdf" type="button">Download PDF</button>
      </div>
      <div class="hint">Exports at print resolution, 3.5 × 2 in standard business card size.</div>
    </div>
  </div>
</div>

<script>
(function(){
  const state = {
    template: 'stock',
    photo: null,
    name:'', role:'', company:'', email:'', phone:'', website:'',
    linkedin:'', twitter:'', github:'', instagram:''
  };

  document.getElementById('jobNo').textContent = String(Math.floor(1000 + Math.random()*8999));

  const ids = ['fName','fRole','fCompany','fEmail','fPhone','fWebsite','fLinkedin','fTwitter','fGithub','fInstagram'];
  const keyMap = { fName:'name', fRole:'role', fCompany:'company', fEmail:'email', fPhone:'phone', fWebsite:'website', fLinkedin:'linkedin', fTwitter:'twitter', fGithub:'github', fInstagram:'instagram' };

  ids.forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      state[keyMap[id]] = e.target.value;
      render();
    });
  });

  // photo upload
  const photoInput = document.getElementById('photoInput');
  document.getElementById('uploadBtn').addEventListener('click', ()=> photoInput.click());
  photoInput.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      state.photo = ev.target.result;
      updatePhotoWell();
      render();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('clearPhoto').addEventListener('click', ()=>{
    state.photo = null;
    photoInput.value = '';
    updatePhotoWell();
    render();
  });

  function updatePhotoWell(){
    const well = document.getElementById('photoWell');
    if(state.photo){
      well.innerHTML = '<img src="'+state.photo+'" alt="">';
    } else {
      well.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="1.5"><circle cx="12" cy="8" r="3.5"/><path d="M4 20c1.8-4 4.7-6 8-6s6.2 2 8 6"/></svg>';
    }
  }

  // template switch
  document.querySelectorAll('.swatch').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.swatch').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.template = btn.dataset.tpl;
      render();
    });
  });

  function initials(name){
    if(!name) return '?';
    const parts = name.trim().split(/\s+/);
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function avatarHtml(sizeClass){
    if(state.photo){
      return '<div class="avatar"><img src="'+state.photo+'" alt=""></div>';
    }
    return '<div class="avatar"><div class="fallback">'+initials(state.name)+'</div></div>';
  }

  function socialLine(){
    const items = [];
    if(state.linkedin) items.push('<b>in</b> '+esc(state.linkedin));
    if(state.twitter) items.push('<b>x</b> '+esc(state.twitter));
    if(state.github) items.push('<b>gh</b> '+esc(state.github));
    if(state.instagram) items.push('<b>ig</b> '+esc(state.instagram));
    return items.join('&nbsp;&nbsp;·&nbsp;&nbsp;');
  }

  function esc(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function contactLines(){
    const lines = [];
    if(state.email) lines.push(esc(state.email));
    if(state.phone) lines.push(esc(state.phone));
    if(state.website) lines.push(esc(state.website));
    return lines;
  }

  function render(){
    const card = document.getElementById('cardPreview');
    const name = esc(state.name) || 'Your Name';
    const role = esc(state.role) || 'Job Title';
    const company = esc(state.company) || 'Company';
    const contact = contactLines();
    const socials = socialLine();

    card.className = 'card tpl-' + state.template;

    if(state.template === 'stock'){
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="name">${name}</div>
            <div class="role">${role} · ${company}</div>
          </div>
          ${avatarHtml()}
        </div>
        <div>
          <div class="rule"></div>
          <div class="contact">${contact.join('<br>') || 'email · phone · website'}</div>
          ${socials ? '<div class="socials" style="margin-top:6px;">'+socials+'</div>' : ''}
        </div>`;
    }

    else if(state.template === 'ink'){
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="name">${name}</div>
            <div class="role">${role} · ${company}</div>
          </div>
          ${avatarHtml()}
        </div>
        <div>
          <div class="rule"></div>
          <div class="contact">${contact.join('<br>') || 'email · phone · website'}</div>
          ${socials ? '<div class="socials" style="margin-top:6px;">'+socials+'</div>' : ''}
        </div>`;
    }

    else if(state.template === 'duotone'){
      card.innerHTML = `
        <div class="half-a">
          <div class="name">${name}</div>
          <div class="role">${role}</div>
        </div>
        ${avatarHtml()}
        <div class="content-b">
          <div class="contact">${contact.join('<br>') || 'email<br>phone<br>website'}</div>
          ${socials ? '<div class="socials">'+socials+'</div>' : ''}
        </div>`;
    }

    else if(state.template === 'grid'){
      card.innerHTML = `
        <div class="top">
          <div>
            <div class="name">${name}</div>
            <div class="role">${company}</div>
          </div>
          ${avatarHtml()}
        </div>
        <div class="divider"></div>
        <div class="grid-fields">
          <div><div class="gf-label">Role</div><div class="gf-value">${role}</div></div>
          <div><div class="gf-label">Email</div><div class="gf-value">${esc(state.email)||'—'}</div></div>
          <div><div class="gf-label">Phone</div><div class="gf-value">${esc(state.phone)||'—'}</div></div>
          <div><div class="gf-label">Web</div><div class="gf-value">${esc(state.website)||'—'}</div></div>
          <div style="grid-column:1 / -1;"><div class="gf-label">Social</div><div class="gf-value copper">${socials || '—'}</div></div>
        </div>`;
    }
  }

  // ---- export ----
  function captureCanvas(){
    const node = document.getElementById('cardPreview');
    return html2canvas(node, { scale: 4, backgroundColor: null, useCORS: true });
  }

  document.getElementById('dlPng').addEventListener('click', function(){
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Rendering…';
    captureCanvas().then(canvas=>{
      const link = document.createElement('a');
      link.download = (state.name ? state.name.replace(/\s+/g,'-').toLowerCase() : 'business-card') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).finally(()=>{
      btn.disabled = false;
      btn.textContent = 'Download PNG';
    });
  });

  document.getElementById('dlPdf').addEventListener('click', function(){
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Rendering…';
    captureCanvas().then(canvas=>{
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation:'landscape', unit:'in', format:[3.5, 2] });
      const imgData = canvas.toDataURL('image/png');
      pdf.addImage(imgData, 'PNG', 0, 0, 3.5, 2);
      pdf.save((state.name ? state.name.replace(/\s+/g,'-').toLowerCase() : 'business-card') + '.pdf');
    }).finally(()=>{
      btn.disabled = false;
      btn.textContent = 'Download PDF';
    });
  });

  render();
})();
</script>

</body>
</html>
